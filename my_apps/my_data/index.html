<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>全景寻路中枢 - 进化版</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#030508">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="寻路中枢">
    <link rel="apple-touch-icon" href="icon.svg">

    <style>
        :root {
            --bg-dark: #030508;
            --card-bg: rgba(12, 16, 24, 0.85);
            --neon-cyan: #00f3ff;
            --neon-cyan-dim: rgba(0, 243, 255, 0.15);
            --text-main: #ffffff;
            --text-muted: #64748b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg-dark);
            background-image: 
                radial-gradient(ellipse at top, var(--neon-cyan-dim) 0%, transparent 60%),
                linear-gradient(rgba(255, 255, 255, 0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.015) 1px, transparent 1px);
            background-size: 100% 100%, 30px 30px, 30px 30px;
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            overscroll-behavior-y: none; 
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        /* --- 巨幕区域 --- */
        .hero-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 243, 255, 0.15);
            border-radius: 30px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(0, 243, 255, 0.05);
            position: relative;
            overflow: hidden;
        }

        .hero-label { font-size: 1.1rem; color: var(--text-muted); letter-spacing: 4px; margin-bottom: 25px; }

        .countdown-wrapper {
            display: flex;
            justify-content: center;
            align-items: baseline;
            gap: 15px;
            margin-bottom: 35px;
            flex-wrap: wrap; 
        }

        .time-block {
            display: flex;
            align-items: baseline;
            background: rgba(255, 255, 255, 0.03);
            padding: 10px 20px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: inset 0 0 15px rgba(0,0,0,0.2);
        }

        .time-num {
            font-family: 'JetBrains Mono', 'Consolas', monospace;
            font-size: 4.5rem;
            font-weight: 700;
            line-height: 1;
            color: var(--text-main);
            text-shadow: 0 4px 15px rgba(0, 0, 0, 0.5), 0 0 20px rgba(255, 255, 255, 0.1);
        }

        .time-unit { font-size: 1.2rem; color: var(--text-muted); margin-left: 8px; font-weight: 500; }
        .time-colon { font-size: 3rem; color: var(--text-muted); padding-bottom: 10px; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .destination-display {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(0, 243, 255, 0.2);
            border-radius: 20px;
            padding: 30px 20px;
            position: relative;
            overflow: hidden;
            word-wrap: break-word; 
        }

        .destination-display::after {
            content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 243, 255, 0.1), transparent);
            animation: scan 3s infinite linear;
            pointer-events: none;
        }
        @keyframes scan { 100% { left: 200%; } }

        .target-loc {
            font-family: 'JetBrains Mono', 'Consolas', monospace;
            font-size: 4.5rem;
            font-weight: 900;
            color: var(--neon-cyan);
            text-shadow: 0 0 25px rgba(0, 243, 255, 0.4);
            line-height: 1;
            margin-bottom: 15px;
            letter-spacing: 2px;
        }

        .target-meta { display: flex; justify-content: center; align-items: center; gap: 15px; font-size: 1.1rem; color: var(--text-main); flex-wrap: wrap; }
        .meta-divider { color: var(--text-muted); }
        .target-teacher { color: var(--text-muted); }

        /* --- 列表区域 --- */
        .list-section { padding: 0 5px; }
        .list-header { 
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 20px; border-left: 3px solid var(--neon-cyan); 
            padding-left: 12px; min-height: 36px;
        }
        .list-title-text { font-size: 1.05rem; color: var(--text-main); font-weight: 500; letter-spacing: 3px; }
        
        .schedule-grid { display: flex; flex-direction: column; gap: 15px; }

        /* 列表项的平滑载入动画 */
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .list-card {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 16px;
            padding: 22px 25px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-left: 4px solid transparent;
            display: flex;
            align-items: center;
            transition: all 0.3s ease;
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .card-time { 
            font-family: 'JetBrains Mono', 'Consolas', monospace; 
            font-size: 1.8rem; font-weight: 700; color: #ffffff; 
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
            min-width: 90px; text-align: left;
            padding-right: 25px; margin-right: 25px;
            border-right: 1px solid rgba(255,255,255,0.1); 
        }
        
        .card-info { display: flex; flex-direction: column; gap: 4px; overflow: hidden;}
        .card-loc { font-family: 'JetBrains Mono', 'Consolas', monospace; font-size: 2rem; font-weight: 800; color: var(--neon-cyan); line-height: 1; word-wrap: break-word;}
        .card-name { font-size: 0.95rem; color: var(--text-main); opacity: 0.9; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .card-day { font-size: 0.8rem; color: var(--neon-cyan); background: rgba(0,243,255,0.1); padding: 2px 8px; border-radius: 4px; margin-top: 4px; display: inline-block; width: fit-content; font-weight: 600; letter-spacing: 1px; }

        /* --- 按钮美化与重塑 --- */
        /* 优化后的“折叠视图”按钮 */
        .btn-close { 
            background: rgba(0, 243, 255, 0.05); 
            border: 1px solid rgba(0, 243, 255, 0.25); 
            color: var(--neon-cyan); 
            padding: 8px 16px; 
            border-radius: 10px; 
            cursor: pointer; 
            font-size: 0.85rem; 
            font-weight: 600;
            letter-spacing: 1px;
            transition: all 0.3s ease; 
        }
        .btn-close:hover { 
            background: rgba(0, 243, 255, 0.15); 
            border-color: rgba(0, 243, 255, 0.5); 
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.2);
            transform: translateY(-2px);
        }

        /* 展开未来视图大按钮 */
        .btn-future { 
            width: 100%; 
            background: transparent; 
            border: 1px dashed rgba(0, 243, 255, 0.4); 
            color: var(--neon-cyan); 
            font-size: 1rem; 
            letter-spacing: 2px; 
            padding: 22px; 
            border-radius: 16px; 
            cursor: pointer; 
            text-transform: uppercase; 
            font-weight: 600; 
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .btn-future:hover {
            border-style: solid;
            background: rgba(0, 243, 255, 0.05); 
            box-shadow: 0 0 25px rgba(0, 243, 255, 0.15);
            transform: translateY(-2px);
        }

        .hidden { display: none !important; }

        /* --- 移动端极简适配 --- */
        @media (max-width: 600px) {
            body { padding: 20px 10px; }
            .hero-card { padding: 30px 15px; border-radius: 20px; }
            .hero-label { font-size: 0.9rem; margin-bottom: 15px; }
            
            .countdown-wrapper { gap: 5px; margin-bottom: 25px; }
            .time-block { padding: 8px 12px; }
            .time-num { font-size: 2.8rem; } 
            .time-unit { font-size: 0.9rem; margin-left: 4px; }
            .time-colon { font-size: 2rem; padding-bottom: 5px; }
            
            .destination-display { padding: 20px 15px; }
            .target-loc { font-size: 2.8rem; }
            .target-meta { font-size: 0.95rem; gap: 8px; flex-direction: column; }
            .meta-divider { display: none; }

            .list-card { padding: 18px 15px; border-radius: 12px; }
            .card-time { font-size: 1.3rem; min-width: 65px; padding-right: 12px; margin-right: 12px; }
            .card-loc { font-size: 1.5rem; }
            .card-name { font-size: 0.85rem; }
            
            .list-title-text { font-size: 0.95rem; }
            .btn-close { padding: 6px 12px; font-size: 0.8rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="hero-card">
            <div class="hero-label" id="hero-label">距离下个坐标点还有</div>
            <div class="countdown-wrapper" id="countdown-container"></div>
            <div class="destination-display">
                <div class="target-loc" id="next-loc">--</div>
                <div class="target-meta">
                    <span id="next-name">同步中...</span>
                    <span class="meta-divider">|</span>
                    <span class="target-teacher" id="next-teacher">--</span>
                </div>
            </div>
        </div>

        <div class="list-section">
            <div class="list-header">
                <div class="list-title-text" id="list-title-text">进程同步中...</div>
                <button id="btn-fold" class="btn-close hidden">折叠视图</button>
            </div>
            <div class="schedule-grid" id="schedule-list"></div>
            <div id="expand-container" class="hidden" style="margin-top: 15px;">
                <button id="btn-expand" class="btn-future">[ SYSTEM: 检索未来跨日进程 ]</button>
            </div>
        </div>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(err => console.error('PWA 注册失败:', err));
            });
        }

        const mySchedule = [
            { day: 1, start: '10:00', end: '12:00', name: '[CST104] Introduction to CST', loc: 'A1#103', teacher: 'Hiew Fui Chin' },
            { day: 1, start: '14:00', end: '17:00', name: '[BSC121] Calculus I A', loc: 'A2#G09', teacher: 'Al-Shawba' },
            { day: 2, start: '12:00', end: '14:00', name: '[CST103] Programming Language (C)', loc: 'A2#G05', teacher: 'Sufyan' },
            { day: 3, start: '13:00', end: '15:00', name: '[CST103] Programming Language (C)', loc: 'B1#106', teacher: 'Sufyan' },
            { day: 3, start: '17:00', end: '19:00', name: '[CST104] Introduction to CST', loc: 'A1#110', teacher: 'Hiew Fui Chin' },
            { day: 4, start: '11:00', end: '13:00', name: '[BSC121] Calculus I A', loc: 'A1#G01', teacher: 'Al-Shawba' },
            { day: 5, start: '09:00', end: '12:00', name: '[BSC124] Linear Algebra', loc: 'A2#G11', teacher: 'Liew Siaw Ching' }
        ];

        const dayStrs = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
        
        let viewFutureMode = false;
        let lastListHtml = "";
        let lastTitleText = "";

        document.getElementById('btn-fold').addEventListener('click', () => { viewFutureMode = false; });
        document.getElementById('btn-expand').addEventListener('click', () => { viewFutureMode = true; });

        function update() {
            const now = new Date();
            const currentDay = now.getDay() === 0 ? 7 : now.getDay();
            const currentTime = now.getHours() * 60 + now.getMinutes();

            let upcoming = [];
            for(let i=0; i<7; i++) {
                let checkDay = (currentDay + i - 1) % 7 + 1;
                let dayClasses = mySchedule.filter(c => c.day === checkDay);
                dayClasses.sort((a,b) => a.start.localeCompare(b.start));

                dayClasses.forEach(c => {
                    const [h, m] = c.start.split(':').map(Number);
                    const [eh, em] = c.end.split(':').map(Number);
                    let targetDate = new Date(now);
                    targetDate.setDate(now.getDate() + i);
                    targetDate.setHours(h, m, 0, 0);
                    let endDate = new Date(now);
                    endDate.setDate(now.getDate() + i);
                    endDate.setHours(eh, em, 0, 0);

                    if(i === 0 && currentTime > (eh * 60 + em)) return;
                    upcoming.push({...c, targetDate, endDate});
                });
            }

            if(upcoming.length > 0) {
                const next = upcoming[0];
                const diff = next.targetDate - now;
                const inProgress = now >= next.targetDate && now <= next.endDate;
                const cdContainer = document.getElementById('countdown-container');

                if(inProgress) {
                    document.getElementById('hero-label').innerText = "📍 抵达坐标 · 课程进行中";
                    cdContainer.innerHTML = `<div class="time-num" style="color: #2ecc71; letter-spacing: 2px;">IN PROGRESS</div>`;
                } else {
                    document.getElementById('hero-label').innerText = "距离前往下一个坐标点还有";
                    const h = Math.floor(diff / 3600000);
                    const m = Math.floor((diff % 3600000) / 60000);
                    const s = Math.floor((diff % 60000) / 1000);
                    if (!document.getElementById('cd-h')) {
                        cdContainer.innerHTML = `
                            <div class="time-block"><span class="time-num" id="cd-h"></span><span class="time-unit">时</span></div><div class="time-colon">:</div>
                            <div class="time-block"><span class="time-num" id="cd-m"></span><span class="time-unit">分</span></div><div class="time-colon">:</div>
                            <div class="time-block"><span class="time-num" id="cd-s"></span><span class="time-unit">秒</span></div>
                        `;
                    }
                    document.getElementById('cd-h').innerText = String(h).padStart(2,'0');
                    document.getElementById('cd-m').innerText = String(m).padStart(2,'0');
                    document.getElementById('cd-s').innerText = String(s).padStart(2,'0');
                }

                document.getElementById('next-loc').innerText = next.loc;
                document.getElementById('next-name').innerText = next.name;
                document.getElementById('next-teacher').innerText = next.teacher;

                const targetDayStr = next.targetDate.toDateString();
                const remainingSameDay = upcoming.filter(c => c.targetDate.toDateString() === targetDayStr).slice(1);
                
                let listHtml = "";
                let titleText = "";
                let showFoldBtn = false;
                let showExpandBtn = false;

                if (viewFutureMode) {
                    titleText = "全局跨日进程扫描";
                    showFoldBtn = true;
                    
                    const futureClasses = upcoming.slice(1);
                    // 为循环生成的元素加入交错动画的 style 延迟
                    listHtml = futureClasses.map((c, index) => `
                        <div class="list-card" style="animation-delay: ${index * 0.05}s">
                            <div class="card-time">${c.start}</div>
                            <div class="card-info">
                                <span class="card-loc">${c.loc}</span>
                                <span class="card-name">${c.name}</span>
                                <div class="card-day">${c.targetDate.getMonth()+1}/${c.targetDate.getDate()} ${dayStrs[c.targetDate.getDay()]}</div>
                            </div>
                        </div>
                    `).join('');
                } else {
                    if (remainingSameDay.length > 0) {
                        const dayName = next.targetDate.getDate() === now.getDate() ? "今日" : dayStrs[next.targetDate.getDay()];
                        titleText = `${dayName} 后续进程`;
                        
                        listHtml = remainingSameDay.map((c, index) => `
                            <div class="list-card" style="animation-delay: ${index * 0.05}s">
                                <div class="card-time">${c.start}</div>
                                <div class="card-info">
                                    <span class="card-loc">${c.loc}</span>
                                    <span class="card-name">${c.name}</span>
                                </div>
                            </div>
                        `).join('');
                    } else {
                        titleText = "当日进程已清空";
                        showExpandBtn = true;
                    }
                }

                if (titleText !== lastTitleText) {
                    document.getElementById('list-title-text').innerText = titleText;
                    lastTitleText = titleText;
                }
                
                if (listHtml !== lastListHtml) {
                    document.getElementById('schedule-list').innerHTML = listHtml;
                    lastListHtml = listHtml;
                }

                document.getElementById('btn-fold').classList.toggle('hidden', !showFoldBtn);
                document.getElementById('expand-container').classList.toggle('hidden', !showExpandBtn);

            } else {
                document.getElementById('hero-label').innerText = "系统空闲";
                document.getElementById('countdown-container').innerHTML = `<div class="time-num">ALL CLEAR</div>`;
                document.getElementById('next-loc').innerText = "N/A";
                document.getElementById('next-name').innerText = "暂无排课";
                document.getElementById('list-title-text').innerText = "";
                document.getElementById('schedule-list').innerHTML = "";
                document.getElementById('btn-fold').classList.add('hidden');
                document.getElementById('expand-container').classList.add('hidden');
            }

            requestAnimationFrame(update);
        }

        update();
    </script>
</body>
</html>
