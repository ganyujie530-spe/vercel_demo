<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>动态课程追踪中枢</title>
    <style>
        /* 页面基础设定：深邃科技感背景 */
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #09121b 0%, #1a2a3a 100%);
            font-family: 'Segoe UI', -apple-system, sans-serif;
            color: #ffffff;
            overflow: hidden;
        }

        /* 核心看板容器 */
        .dashboard {
            width: 90%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* 卡片通用毛玻璃效果 */
        .card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            transition: transform 0.3s ease;
        }

        /* 核心信息区：下一节课 (放大突出) */
        .primary-card {
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        
        .primary-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 4px;
            background: linear-gradient(90deg, #00f2fe, #4facfe);
        }

        .status-text {
            font-size: 1.5rem;
            color: #a0aec0;
            margin-bottom: 15px;
            font-weight: 500;
            letter-spacing: 2px;
        }

        /* 倒计时巨幕 */
        .countdown {
            font-size: 5.5rem;
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 20px;
            background: linear-gradient(to right, #ffffff, #a0aec0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-family: 'Consolas', monospace;
        }

        /* 核心动作指引 */
        .action-text {
            font-size: 2.2rem;
            font-weight: 600;
            line-height: 1.4;
        }

        .highlight-loc {
            color: #00f2fe;
            background: rgba(0, 242, 254, 0.1);
            padding: 4px 12px;
            border-radius: 8px;
            display: inline-block;
            margin: 0 8px;
        }

        .highlight-class {
            color: #4facfe;
        }

        /* 次要信息区：下节课的下节课 (缩小弱化) */
        .secondary-card {
            padding: 25px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.2);
        }

        .sec-label {
            font-size: 1.1rem;
            color: #718096;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .sec-details {
            font-size: 1.3rem;
            color: #e2e8f0;
        }

        .sec-teacher {
            font-size: 0.95rem;
            color: #718096;
            margin-top: 5px;
        }

        .time-badge {
            background: rgba(255, 255, 255, 0.1);
            padding: 6px 12px;
            border-radius: 6px;
            font-family: monospace;
            font-size: 1.1rem;
            color: #cbd5e0;
        }

        /* 响应式适配移动端 */
        @media (max-width: 768px) {
            .countdown { font-size: 3.5rem; }
            .action-text { font-size: 1.5rem; }
            .secondary-card { flex-direction: column; align-items: flex-start; gap: 15px; }
            .card { padding: 25px; }
        }
    </style>
</head>
<body>

    <div class="dashboard">
        <div class="card primary-card">
            <div class="status-text">距离下一节课还有</div>
            <div class="countdown" id="countdown">--:--:--</div>
            <div class="action-text">
                前往 <span class="highlight-loc" id="next-loc">--</span> 上 <br>
                <span class="highlight-class" id="next-class">--</span>
            </div>
        </div>

        <div class="card secondary-card">
            <div>
                <div class="sec-label">⏭️ 下节课的下节课</div>
                <div class="sec-details">
                    <span id="future-class">--</span> 
                    <span style="opacity: 0.5; margin: 0 8px;">|</span> 
                    <span id="future-loc" style="color: #00f2fe;">--</span>
                </div>
                <div class="sec-teacher" id="future-teacher">--</div>
            </div>
            <div class="time-badge" id="future-time">--</div>
        </div>
    </div>

    <script>
        // 你的完整静态课程表数据
        const scheduleData = [
            { day: 1, start: '10:00', end: '12:00', name: '[CST104] Introduction to CST', loc: 'A1#103', teacher: 'Hiew Fui Chin' },
            { day: 1, start: '14:00', end: '17:00', name: '[BSC121] Calculus I A', loc: 'A2#G09', teacher: 'Al-Shawba Altaf Abdulkarem Ali' },
            { day: 2, start: '12:00', end: '14:00', name: '[CST103] Programming Language (C)', loc: 'A2#G05', teacher: 'Muhammad Sufyan Bin Qari Abdul Shakoor' },
            { day: 3, start: '13:00', end: '15:00', name: '[CST103] Programming Language (C)', loc: 'B1#106', teacher: 'Muhammad Sufyan Bin Qari Abdul Shakoor' },
            { day: 3, start: '17:00', end: '19:00', name: '[CST104] Introduction to CST', loc: 'A1#110', teacher: 'Hiew Fui Chin' },
            { day: 4, start: '11:00', end: '13:00', name: '[BSC121] Calculus I A', loc: 'A1#G01', teacher: 'Al-Shawba Altaf Abdulkarem Ali' },
            { day: 5, start: '09:00', end: '12:00', name: '[BSC124] Linear Algebra', loc: 'A2#G11', teacher: 'Liew Siaw Ching' }
        ];

        const dayNames = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];

        // 生成目标时间的 Date 对象
        function createTargetDate(now, daysToAdd, timeStr) {
            const [hours, minutes] = timeStr.split(':').map(Number);
            const target = new Date(now);
            target.setDate(target.getDate() + daysToAdd);
            target.setHours(hours, minutes, 0, 0);
            return target;
        }

        // 核心算法：搜索接下来的两节课
        function getUpcomingClasses() {
            const now = new Date();
            const currentDay = now.getDay(); // 0-6 (Sun-Sat)
            const currentHours = now.getHours();
            const currentMinutes = now.getMinutes();
            const currentTimeStr = `${String(currentHours).padStart(2, '0')}:${String(currentMinutes).padStart(2, '0')}`;

            let upcoming = [];
            let daysLookAhead = 0;

            // 往后搜索14天，确保能跨过周末找到下两节课
            while (upcoming.length < 2 && daysLookAhead < 14) {
                let checkDay = (currentDay + daysLookAhead) % 7;
                // 将 Date.getDay() 映射到课程表 day (1=Mon ... 5=Fri)
                let mappedDay = checkDay === 0 ? 7 : checkDay; 
                
                let dayClasses = scheduleData.filter(c => c.day === mappedDay);
                dayClasses.sort((a, b) => a.start.localeCompare(b.start));

                for (let cls of dayClasses) {
                    // 如果是今天，只筛选还没开始的课
                    if (daysLookAhead === 0) {
                        if (cls.start > currentTimeStr) {
                            upcoming.push({ ...cls, targetDate: createTargetDate(now, daysLookAhead, cls.start) });
                        }
                    } else {
                        // 如果是未来几天，所有课都符合条件
                        upcoming.push({ ...cls, targetDate: createTargetDate(now, daysLookAhead, cls.start) });
                    }
                    if (upcoming.length >= 2) break;
                }
                daysLookAhead++;
            }
            return upcoming;
        }

        // 格式化倒计时显示
        function formatCountdown(diffMs) {
            if (diffMs <= 0) return "00:00:00";
            const totalSeconds = Math.floor(diffMs / 1000);
            const days = Math.floor(totalSeconds / 86400);
            const hours = Math.floor((totalSeconds % 86400) / 3600);
            const minutes = Math.floor((totalSeconds % 3600) / 60);
            const seconds = totalSeconds % 60;

            let result = `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
            if (days > 0) result = `${days}天 ` + result;
            return result;
        }

        // 渲染页面数据
        function renderDashboard() {
            const upcoming = getUpcomingClasses();
            
            if (upcoming.length >= 1) {
                const nextClass = upcoming[0];
                const now = new Date();
                const diff = nextClass.targetDate - now;

                document.getElementById('countdown').innerText = formatCountdown(diff);
                document.getElementById('next-loc').innerText = nextClass.loc;
                document.getElementById('next-class').innerText = nextClass.name;
            } else {
                document.getElementById('countdown').innerText = "假期中";
                document.getElementById('next-loc').innerText = "--";
                document.getElementById('next-class').innerText = "暂无课程安排";
            }

            if (upcoming.length >= 2) {
                const futureClass = upcoming[1];
                document.getElementById('future-class').innerText = futureClass.name;
                document.getElementById('future-loc').innerText = futureClass.loc;
                document.getElementById('future-teacher').innerText = `👨‍🏫 ${futureClass.teacher}`;
                document.getElementById('future-time').innerText = `${dayNames[futureClass.targetDate.getDay()]} ${futureClass.start}`;
            }
            
            requestAnimationFrame(renderDashboard);
        }

        // 启动渲染引擎
        requestAnimationFrame(renderDashboard);
    </script>
</body>
</html>
