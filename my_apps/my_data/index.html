<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>极简专注 - 寻路中枢</title>
    <style>
        :root {
            --bg-color: #070a0f;
            --card-bg: rgba(15, 20, 28, 0.8);
            --accent-cyan: #00f3ff;
            --text-main: #f8fafc;
            --text-dim: #64748b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg-color);
            background-image: radial-gradient(circle at 50% 0%, rgba(0, 243, 255, 0.08) 0%, transparent 60%);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 15px;
        }

        .container {
            width: 100%;
            max-width: 600px; /* 收窄宽度，让视觉更聚焦 */
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* 顶部时钟 */
        .header { text-align: center; margin-bottom: 10px; }
        .header-clock { font-family: 'Consolas', monospace; font-size: 1.5rem; font-weight: bold; color: var(--text-main); }
        .header-date { font-size: 0.9rem; color: var(--text-dim); letter-spacing: 2px; }

        /* 巨幕卡片：目的地 */
        .hero-card {
            background: var(--card-bg);
            border: 1px solid rgba(0, 243, 255, 0.15);
            border-radius: 30px;
            padding: 40px 20px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(0, 243, 255, 0.02);
            position: relative;
        }

        .label-status { font-size: 0.9rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 15px; }
        
        .timer {
            font-family: 'Consolas', monospace;
            font-size: 3.5rem;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 25px;
            line-height: 1;
        }

        /* 核心修改：地点绝对霸屏 */
        .destination-box {
            background: rgba(0, 243, 255, 0.05);
            border-radius: 20px;
            padding: 25px 10px;
            margin-top: 10px;
            border: 1px solid rgba(0, 243, 255, 0.1);
        }

        .hero-loc {
            font-family: 'Consolas', monospace;
            font-size: 4.5rem; /* 地点超大字号 */
            font-weight: 900;
            color: var(--accent-cyan);
            text-shadow: 0 0 25px rgba(0, 243, 255, 0.4);
            line-height: 1;
            margin-bottom: 15px;
            display: block;
        }

        .hero-class { font-size: 1.1rem; color: var(--text-main); font-weight: 500; margin-bottom: 5px; }
        .hero-teacher { font-size: 0.9rem; color: var(--text-dim); }

        /* 当天后续课程列表 */
        .list-header { font-size: 0.85rem; color: var(--text-dim); letter-spacing: 2px; margin: 10px 0 5px 10px; }
        
        .schedule-list { display: flex; flex-direction: column; gap: 15px; }

        .class-item {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
        }

        .item-time {
            font-family: 'Consolas', monospace;
            font-size: 1.1rem;
            color: var(--text-dim);
            min-width: 70px;
            border-right: 1px solid rgba(255,255,255,0.1);
            margin-right: 20px;
            padding-right: 15px;
            text-align: right;
        }

        .item-info { flex-grow: 1; }
        
        /* 列表里的地点也是最大的 */
        .item-loc {
            font-family: 'Consolas', monospace;
            font-size: 2rem;
            font-weight: 800;
            color: var(--accent-cyan);
            display: block;
            margin-bottom: 4px;
        }
        .item-class { font-size: 0.9rem; color: var(--text-dim); }

        @media (max-width: 500px) {
            .hero-loc { font-size: 3.5rem; }
            .timer { font-size: 3rem; }
            .item-loc { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <div class="header-clock" id="header-clock">--:--:--</div>
            <div class="header-date" id="header-date">--</div>
        </div>

        <div class="hero-card">
            <div class="label-status" id="hero-label">倒计时</div>
            <div class="timer" id="countdown">--:--:--</div>
            
            <div class="destination-box">
                <div class="hero-loc" id="next-loc">--</div>
                <div class="hero-class" id="next-name">正在检索目标地点...</div>
                <div class="hero-teacher" id="next-teacher">--</div>
            </div>
        </div>

        <div>
            <div class="list-header" id="list-title">当天后续日程</div>
            <div class="schedule-list" id="schedule-list">
                </div>
        </div>
    </div>

    <script>
        const mySchedule = [
            { day: 1, start: '10:00', end: '12:00', name: '[CST104] Introduction to CST', loc: 'A1#103', teacher: 'Hiew Fui Chin' },
            { day: 1, start: '14:00', end: '17:00', name: '[BSC121] Calculus I A', loc: 'A2#G09', teacher: 'Al-Shawba' },
            { day: 2, start: '12:00', end: '14:00', name: '[CST103] Programming Language (C)', loc: 'A2#G05', teacher: 'Sufyan' },
            { day: 3, start: '13:00', end: '15:00', name: '[CST103] Programming Language (C)', loc: 'B1#106', teacher: 'Sufyan' },
            { day: 3, start: '17:00', end: '19:00', name: '[CST104] Introduction to CST', loc: 'A1#110', teacher: 'Hiew Fui Chin' },
            { day: 4, start: '11:00', end: '13:00', name: '[BSC121] Calculus I A', loc: 'A1#G01', teacher: 'Al-Shawba' },
            { day: 5, start: '09:00', end: '12:00', name: '[BSC124] Linear Algebra', loc: 'A2#G11', teacher: 'Liew Siaw Ching' }
        ];

        const dayStrs = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];

        function update() {
            const now = new Date();
            
            // 时钟更新
            document.getElementById('header-clock').innerText = now.toTimeString().split(' ')[0];
            document.getElementById('header-date').innerText = `${now.getMonth()+1}月${now.getDate()}日 ${dayStrs[now.getDay()]}`;

            const currentDay = now.getDay() === 0 ? 7 : now.getDay();
            const currentTime = now.getHours() * 60 + now.getMinutes();

            let upcoming = [];
            let targetDayOffset = -1; // 锁定“下节课”所在的那一天

            // 搜索逻辑
            for(let i=0; i<7; i++) {
                let checkDay = (currentDay + i - 1) % 7 + 1;
                let dayClasses = mySchedule.filter(c => c.day === checkDay);
                dayClasses.sort((a,b) => a.start.localeCompare(b.start));

                dayClasses.forEach(c => {
                    const [h, m] = c.start.split(':').map(Number);
                    const [eh, em] = c.end.split(':').map(Number);
                    
                    let targetDate = new Date(now);
                    targetDate.setDate(now.getDate() + i);
                    targetDate.setHours(h, m, 0, 0);

                    let endDate = new Date(now);
                    endDate.setDate(now.getDate() + i);
                    endDate.setHours(eh, em, 0, 0);

                    // 如果是今天，跳过已经结束的课
                    if(i === 0 && currentTime > (eh * 60 + em)) return;

                    // 锁定我们要找的“那一天”
                    if (targetDayOffset === -1) {
                        targetDayOffset = i;
                    }

                    // 只把“那一天”的课放进数组，其他的统统不要
                    if (i === targetDayOffset) {
                        upcoming.push({...c, targetDate, endDate});
                    }
                });

                // 一旦找到了目标天，收集完数据就跳出循环
                if (targetDayOffset !== -1) break;
            }

            // 渲染数据
            if(upcoming.length > 0) {
                const next = upcoming[0];
                const diff = next.targetDate - now;
                const inProgress = now >= next.targetDate && now <= next.endDate;

                // 主面板状态
                if(inProgress) {
                    document.getElementById('hero-label').innerText = "当前位置";
                    document.getElementById('countdown').innerText = "IN CLASS";
                    document.getElementById('countdown').style.color = "#2ecc71"; // 绿色
                } else {
                    document.getElementById('hero-label').innerText = "距离前往下一地点还有";
                    const h = Math.floor(diff / 3600000);
                    const m = Math.floor((diff % 3600000) / 60000);
                    const s = Math.floor((diff % 60000) / 1000);
                    document.getElementById('countdown').innerText = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
                    document.getElementById('countdown').style.color = "var(--text-main)";
                }

                // 核心：超大地点渲染
                document.getElementById('next-loc').innerText = next.loc;
                document.getElementById('next-name').innerText = next.name;
                document.getElementById('next-teacher').innerText = next.teacher;

                // 列表渲染 (只显示当天剩下的课)
                const remainingClasses = upcoming.slice(1);
                
                if (remainingClasses.length > 0) {
                    const dayName = targetDayOffset === 0 ? "今天" : dayStrs[next.targetDate.getDay()];
                    document.getElementById('list-title').innerText = `${dayName} 后续日程`;
                    
                    const listHtml = remainingClasses.map(c => `
                        <div class="class-item">
                            <div class="item-time">${c.start}</div>
                            <div class="item-info">
                                <span class="item-loc">${c.loc}</span>
                                <span class="item-class">${c.name}</span>
                            </div>
                        </div>
                    `).join('');
                    document.getElementById('schedule-list').innerHTML = listHtml;
                } else {
                    document.getElementById('list-title').innerText = "当天已无后续课程";
                    document.getElementById('schedule-list').innerHTML = "";
                }

            } else {
                document.getElementById('hero-label').innerText = "状态";
                document.getElementById('countdown').innerText = "FREE";
                document.getElementById('next-loc').innerText = "宿舍";
                document.getElementById('next-name').innerText = "暂无排课数据";
                document.getElementById('next-teacher').innerText = "--";
                document.getElementById('schedule-list').innerHTML = "";
            }

            requestAnimationFrame(update);
        }

        update();
    </script>
</body>
</html>
