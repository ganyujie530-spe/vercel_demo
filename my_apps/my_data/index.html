<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>甘宇杰的学术指挥中心</title>
    <style>
        :root {
            --bg-color: #05070a;
            --card-bg: rgba(20, 25, 35, 0.7);
            --accent-cyan: #00f3ff;
            --accent-purple: #7d5fff;
            --accent-green: #2ecc71;
            --text-main: #e2e8f0;
            --text-dim: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg-color);
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(0, 243, 255, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(125, 95, 255, 0.05) 0%, transparent 40%);
            font-family: 'Inter', 'Segoe UI', -apple-system, sans-serif;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }

        .container {
            width: 95%;
            max-width: 1100px;
            padding: 20px;
            display: grid;
            grid-template-columns: 1fr;
            gap: 25px;
        }

        /* 顶部状态栏 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding: 0 10px;
        }
        .header-time { font-family: 'JetBrains Mono', monospace; font-size: 1.2rem; color: var(--accent-cyan); }
        .header-date { font-size: 0.9rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }

        /* 核心巨幕卡片 (下一节课) */
        .hero-card {
            background: var(--card-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 32px;
            padding: 50px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .hero-card::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 4px;
            background: linear-gradient(90deg, var(--accent-cyan), var(--accent-purple));
        }

        .label-next {
            font-size: 0.9rem;
            color: var(--accent-cyan);
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 20px;
            display: block;
        }

        .timer {
            font-family: 'JetBrains Mono', monospace;
            font-size: 6rem;
            font-weight: 800;
            margin: 10px 0;
            background: linear-gradient(180deg, #fff 0%, #94a3b8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
        }

        .next-info { margin-top: 30px; }
        .next-title { font-size: 2.2rem; font-weight: 700; margin-bottom: 10px; }
        .next-meta { font-size: 1.2rem; color: var(--text-dim); display: flex; justify-content: center; gap: 20px; align-items: center; }
        .badge-loc { 
            background: rgba(0, 243, 255, 0.1); 
            color: var(--accent-cyan); 
            padding: 4px 16px; 
            border-radius: 100px; 
            border: 1px solid rgba(0, 243, 255, 0.3);
            font-weight: 600;
        }

        /* 课程表列表 */
        .schedule-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .class-item {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            gap: 15px;
            transition: all 0.3s ease;
        }

        .class-item:hover { background: rgba(255, 255, 255, 0.06); transform: translateX(5px); }

        .class-time-box {
            min-width: 80px;
            text-align: center;
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            padding-right: 15px;
        }
        .item-time { font-family: monospace; font-size: 1rem; color: #fff; }
        .item-day { font-size: 0.7rem; color: var(--text-dim); }

        .class-content { flex-grow: 1; }
        .item-name { font-weight: 600; font-size: 1.1rem; margin-bottom: 4px; display: block; }
        .item-loc { font-size: 0.85rem; color: var(--text-dim); }

        .status-pill {
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 4px;
            text-transform: uppercase;
            font-weight: bold;
        }
        .status-future { background: rgba(255,255,255,0.1); color: #888; }
        .status-active { background: var(--accent-green); color: #000; box-shadow: 0 0 10px var(--accent-green); }

        @media (max-width: 768px) {
            .timer { font-size: 4rem; }
            .next-title { font-size: 1.5rem; }
            .hero-card { padding: 30px 20px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <div>
                <div class="header-date" id="header-date">THURSDAY, APR 16</div>
                <div class="header-time" id="header-clock">23:40:00</div>
            </div>
            <div style="text-align: right">
                <div class="header-date">System Status</div>
                <div class="header-time" style="color: var(--accent-green)">● ONLINE</div>
            </div>
        </div>

        <div class="hero-card">
            <span class="label-next" id="hero-label">距离下节课开始还有</span>
            <div class="timer" id="countdown">00:00:00</div>
            <div class="next-info">
                <div class="next-title" id="next-name">正在检索课程...</div>
                <div class="next-meta">
                    <span class="badge-loc" id="next-loc">--</span>
                    <span id="next-teacher">--</span>
                </div>
            </div>
        </div>

        <div style="margin-top: 10px;">
            <h3 style="margin-bottom: 20px; font-weight: 400; color: var(--text-dim); letter-spacing: 2px; font-size: 0.9rem;">后续日程 UPCOMING</h3>
            <div class="schedule-grid" id="schedule-list">
                </div>
        </div>
    </div>

    <script>
        // 核心课程数据
        const mySchedule = [
            { day: 1, start: '10:00', end: '12:00', name: '[CST104] Intro to CST', loc: 'A1#103', teacher: 'Hiew Fui Chin' },
            { day: 1, start: '14:00', end: '17:00', name: '[BSC121] Calculus I A', loc: 'A2#G09', teacher: 'Al-Shawba' },
            { day: 2, start: '12:00', end: '14:00', name: '[CST103] Programming Language (C)', loc: 'A2#G05', teacher: 'Sufyan' },
            { day: 3, start: '13:00', end: '15:00', name: '[CST103] Programming Language (C)', loc: 'B1#106', teacher: 'Sufyan' },
            { day: 3, start: '17:00', end: '19:00', name: '[CST104] Intro to CST', loc: 'A1#110', teacher: 'Hiew Fui Chin' },
            { day: 4, start: '11:00', end: '13:00', name: '[BSC121] Calculus I A', loc: 'A1#G01', teacher: 'Al-Shawba' },
            { day: 5, start: '09:00', end: '12:00', name: '[BSC124] Linear Algebra', loc: 'A2#G11', teacher: 'Liew Siaw Ching' }
        ];

        const dayStrs = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];

        function update() {
            const now = new Date();
            
            // 更新时钟
            document.getElementById('header-clock').innerText = now.toTimeString().split(' ')[0];
            document.getElementById('header-date').innerText = `${dayStrs[now.getDay()]} , ${now.toLocaleDateString('en-US', {month:'short', day:'numeric'}).toUpperCase()}`;

            // 计算课程逻辑
            const currentDay = now.getDay() === 0 ? 7 : now.getDay();
            const currentTime = now.getHours() * 60 + now.getMinutes();

            let upcoming = [];
            // 扫描未来 7 天的课
            for(let i=0; i<7; i++) {
                let checkDay = (currentDay + i - 1) % 7 + 1;
                let dayClasses = mySchedule.filter(c => c.day === checkDay);
                dayClasses.sort((a,b) => a.start.localeCompare(b.start));

                dayClasses.forEach(c => {
                    const [h, m] = c.start.split(':').map(Number);
                    const [eh, em] = c.end.split(':').map(Number);
                    const startTotal = h * 60 + m;
                    const endTotal = eh * 60 + em;
                    
                    let targetDate = new Date(now);
                    targetDate.setDate(now.getDate() + i);
                    targetDate.setHours(h, m, 0, 0);

                    let endDate = new Date(now);
                    endDate.setDate(now.getDate() + i);
                    endDate.setHours(eh, em, 0, 0);

                    // 排除已经过去的今天的课
                    if(i === 0 && currentTime > endTotal) return;
                    
                    upcoming.push({...c, targetDate, endDate, isToday: i===0});
                });
                if(upcoming.length > 6) break;
            }

            if(upcoming.length > 0) {
                const next = upcoming[0];
                const diff = next.targetDate - now;
                const inProgress = now >= next.targetDate && now <= next.endDate;

                if(inProgress) {
                    document.getElementById('hero-label').innerText = "当前课程正在进行中 ACTIVE NOW";
                    document.getElementById('countdown').innerText = "IN CLASS";
                    document.getElementById('countdown').style.color = "var(--accent-green)";
                } else {
                    document.getElementById('hero-label').innerText = "距离下一节课开始还有";
                    const h = Math.floor(diff / 3600000);
                    const m = Math.floor((diff % 3600000) / 60000);
                    const s = Math.floor((diff % 60000) / 1000);
                    document.getElementById('countdown').innerText = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
                    document.getElementById('countdown').style.color = "";
                }

                document.getElementById('next-name').innerText = next.name;
                document.getElementById('next-loc').innerText = next.loc;
                document.getElementById('next-teacher').innerText = "👨‍🏫 " + next.teacher;

                // 渲染下方列表 (取接下来的 4 个)
                const listHtml = upcoming.slice(1, 5).map(c => `
                    <div class="class-item">
                        <div class="class-time-box">
                            <div class="item-time">${c.start}</div>
                            <div class="item-day">${dayStrs[c.targetDate.getDay()]}</div>
                        </div>
                        <div class="class-content">
                            <span class="item-name">${c.name}</span>
                            <span class="item-loc">📍 ${c.loc}</span>
                        </div>
                        <span class="status-pill status-future">Next</span>
                    </div>
                `).join('');
                document.getElementById('schedule-list').innerHTML = listHtml;
            }

            requestAnimationFrame(update);
        }

        update();
    </script>
</body>
</html>
